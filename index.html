<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xammers & atlizon · дуо портал</title>
    <!-- Font Awesome (иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b0c0e 0%, #1a1d24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* главная карточка */
        .glass-panel {
            max-width: 1100px;
            width: 100%;
            background: rgba(20, 22, 27, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 70, 70, 0.25);
            border-radius: 48px 48px 36px 36px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(180, 40, 40, 0.3) inset;
            padding: 28px 28px 35px;
            transition: all 0.2s;
        }

        /* шапка с аватарками и музыкой */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .avatars {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .avatar-block {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 20px 8px 12px;
            border-radius: 60px;
            border: 1px solid #9f2b2b;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
        }

        .avatar-img {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #c44;
            background: #2a1e1e;
        }

        .avatar-name {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 1px;
            text-shadow: 0 0 6px #f44;
        }

        .xammers .avatar-name { color: #ff7b7b; }
        .atlizon .avatar-name { color: #b5a0ff; }

        /* плеер минималистичный */
        .music-area {
            background: #1e1b22;
            border-radius: 60px;
            padding: 8px 18px;
            border: 1px solid #a55;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #f0c0c0;
            box-shadow: 0 0 10px #c43;
        }

        .music-icon {
            font-size: 1.8rem;
            color: #d66;
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 2px #f99; }
            50% { text-shadow: 0 0 15px #f33; }
            100% { text-shadow: 0 0 2px #f99; }
        }

        .music-controls audio {
            height: 38px;
            filter: sepia(0.4) hue-rotate(310deg) brightness(1.1);
            border-radius: 40px;
        }

        /* табы (основная навигация) */
        .tabs {
            display: flex;
            gap: 20px;
            border-bottom: 3px solid #882222;
            padding-bottom: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #ccc;
            font-size: 1.7rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 10px 25px;
            cursor: pointer;
            border-radius: 40px 40px 0 0;
            letter-spacing: 1.5px;
            transition: 0.2s;
            position: relative;
            overflow: hidden;
            text-shadow: 0 2px 3px black;
        }

        .tab-btn.active {
            color: white;
            background: #902020;
            box-shadow: 0 -2px 15px #f33;
        }

        .tab-btn:not(.active):hover {
            color: #ffa0a0;
            background: rgba(150, 40, 40, 0.4);
        }

        /* контент табов */
        .tab-content {
            background: rgba(12, 10, 16, 0.7);
            border-radius: 36px;
            padding: 28px 24px;
            border: 1px solid #a33;
            margin-bottom: 30px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.7);
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active-pane {
            display: block;
        }

        /* заголовки внутри табов */
        .section-title {
            color: #ffb7b7;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 28px;
            border-left: 10px solid #c44;
            padding-left: 20px;
            text-transform: uppercase;
        }

        /* сетка тем (5 штук) */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 18px;
            margin-bottom: 40px;
        }

        .topic-card {
            background: #2c222a;
            border: 2px solid #6f3030;
            border-radius: 30px;
            padding: 18px 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1.25rem;
            color: #ffd9b0;
            transition: 0.2s;
            box-shadow: 0 7px 0 #3f1c1c;
            cursor: default;
            backdrop-filter: blur(4px);
        }

        .topic-card i {
            display: block;
            font-size: 2rem;
            margin-bottom: 8px;
            color: #d66;
        }

        .topic-card:hover {
            transform: translateY(-4px);
            border-color: #f66;
            box-shadow: 0 11px 0 #6f2b2b;
        }

        /* КНОПКА WORK (с эффектом капающей крови) */
        .work-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 25px 0 20px;
        }

        .work-btn {
            position: relative;
            background: #2c0f0f;
            border: 3px solid #a00;
            color: white;
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            padding: 20px 70px;
            border-radius: 80px;
            letter-spacing: 8px;
            cursor: pointer;
            box-shadow: 0 15px 0 #4d0f0f, 0 0 30px #d00;
            transition: 0.05s linear;
            z-index: 5;
            overflow: visible;
            line-height: 1;
        }

        /* эффект капающей крови (псевдоэлементы) */
        .work-btn::before,
        .work-btn::after {
            content: "";
            position: absolute;
            top: -15px;
            left: 20%;
            width: 12px;
            height: 20px;
            background: #c22;
            border-radius: 50%;
            filter: blur(2px);
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 12px red;
            z-index: 2;
        }

        .work-btn::after {
            top: auto;
            bottom: -25px;
            left: 70%;
            width: 18px;
            height: 30px;
            background: #b11;
        }

        .work-btn:hover::before {
            opacity: 1;
            animation: dripLeft 0.8s infinite;
        }

        .work-btn:hover::after {
            opacity: 1;
            animation: dripRight 1s infinite 0.2s;
        }

        @keyframes dripLeft {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            80% { transform: translateY(50px) scale(0.7); opacity: 0.7; }
            100% { transform: translateY(70px) scale(0.3); opacity: 0; }
        }

        @keyframes dripRight {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            80% { transform: translateY(-50px) scale(0.8); opacity: 0.6; }
            100% { transform: translateY(-80px) scale(0.2); opacity: 0; }
        }

        /* чтобы кнопка не обрезала капли */
        .work-btn:hover {
            transform: scale(1.02);
            background: #551818;
            border-color: #f33;
        }

        /* контейнер со списком ссылок (изначально скрыт) */
        .work-links {
            background: #1f1722;
            border-radius: 40px;
            padding: 25px 25px;
            margin-top: 25px;
            border: 2px dashed #a55;
            display: none;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: inset 0 0 20px #2a0f0f;
        }

        .work-links.show {
            display: block;
        }

        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px;
        }

        .work-link {
            display: block;
            background: #2d1e2a;
            color: #ffbcbc;
            padding: 16px 20px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid #b44;
            transition: 0.15s;
            word-break: break-all;
            text-align: center;
        }

        .work-link:hover {
            background: #732;
            color: white;
            border-color: #f88;
            transform: scale(1.02);
        }

        /* нижняя подпись */
        .signature {
            text-align: center;
            margin-top: 30px;
            font-size: 2rem;
            font-weight: 800;
            color: #b55;
            background: rgba(0,0,0,0.5);
            padding: 16px 10px;
            border-radius: 60px;
            border: 1px solid #933;
            text-transform: uppercase;
            letter-spacing: 4px;
            word-break: break-word;
        }

        .signature span {
            color: #faa;
            text-shadow: 0 0 10px #f33;
        }

        /* скролл бар */
        .work-links::-webkit-scrollbar {
            width: 12px;
        }

        .work-links::-webkit-scrollbar-track {
            background: #2d1b1b;
        }

        .work-links::-webkit-scrollbar-thumb {
            background: #a33;
            border-radius: 20px;
        }

        /* адаптация */
        @media (max-width: 700px) {
            .work-btn { font-size: 2rem; padding: 15px 30px; }
            .signature { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <!-- верх: аватарки + музыка -->
    <div class="top-bar">
        <div class="avatars">
            <!-- xammers -->
            <div class="avatar-block xammers">
                <!-- avatar1.jpg для xammers -->
                <img src="avatar1.jpg" alt="xammers" class="avatar-img" onerror="this.src='https://via.placeholder.com/52/a33/fff?text=X'">
                <span class="avatar-name">xammers</span>
            </div>
            <!-- atlizon -->
            <div class="avatar-block atlizon">
                <img src="avatar2.jpg" alt="atlizon" class="avatar-img" onerror="this.src='https://via.placeholder.com/52/63a/fff?text=A'">
                <span class="avatar-name">atlizon</span>
            </div>
        </div>

        <!-- Музыкальный плеер (music.html функциональность) 
             Если файл music.html существует в репозитории, можно использовать его как fallback?
             но проще встроить аудио. В условии: "если я добавлю файл в репозитории music.html и проигрывалась музыка".
             Сделаем хитро: если music.html загрузить как аудио не выйдет, но можно создать аудиоэлемент с треком.
             Для соответствия ожиданию добавим скрытый iframe с music.html? но вероятнее нужен просто аудиоплеер.
             Реализуем audio с файлом, который пользователь сможет загрузить (music.mp3 или .ogg). А music.html может содержать плеер.
             Поскольку нужен именно работающий плеер, я вставлю audio с тестовым файлом, но если пользователь положит music.html в корень — ничего не сломается.
        -->
        <div class="music-area">
            <div class="music-icon"><i class="fas fa-headphones-alt"></i></div>
            <div class="music-controls">
                <audio controls loop>
                    <source src="music.mp3" type="audio/mpeg">
                    <source src="music.ogg" type="audio/ogg">
                    <!-- если в репозитории будет music.html, он не проиграется как аудио, 
                         но можно подгрузить его скрытно? нет, лучше стандартный плеер.
                         Добавим сообщение если нет файла, но плеер отобразится -->
                    Your browser does not support audio.
                </audio>
            </div>
        </div>
    </div>

    <!-- Табы: xammers / atlizon -->
    <div class="tabs">
        <button class="tab-btn active" id="tabXammers"><i class="fas fa-skull"></i> XAMMERS</button>
        <button class="tab-btn" id="tabAtlizon"><i class="fas fa-dragon"></i> ATLIZON</button>
    </div>

    <!-- Контейнер с переключаемым содержимым -->
    <div class="tab-content">
        <!-- ПАНЕЛЬ XAMMERS -->
        <div class="tab-pane active-pane" id="paneXammers">
            <div class="section-title"><i class="fas fa-bolt"></i> темы xammers · хаос</div>
            <!-- 5 рандомных тем (для xammers) -->
            <div class="topics-grid" id="xammersTopics"></div>
            <!-- Кнопка WORK + ссылки -->
            <div class="work-wrapper">
                <button class="work-btn" id="workBtnX"><i class="fas fa-tint"></i> WORK</button>
                <div class="work-links" id="workLinksX"></div>
            </div>
        </div>

        <!-- ПАНЕЛЬ ATLIZON -->
        <div class="tab-pane" id="paneAtlizon">
            <div class="section-title"><i class="fas fa-moon"></i> темы atlizon · мистика</div>
            <div class="topics-grid" id="atlizonTopics"></div>
            <div class="work-wrapper">
                <button class="work-btn" id="workBtnA"><i class="fas fa-tint"></i> WORK</button>
                <div class="work-links" id="workLinksA"></div>
            </div>
        </div>
    </div>

    <!-- надпись adapt xammers and atlizon -->
    <div class="signature">
        <span>🩸 adapt xammers and atlizon 🩸</span>
    </div>
</div>

<script>
    (function() {
        // ----- СПИСОК ССЫЛОК (точно по заданию) -----
        const workUrls = [
            "https://telegra.ph/Work-1-03-16",
            "https://telegra.ph/work-2-03-16",
            "https://telegra.ph/work-3-03-16",
            "https://telegra.ph/work-4-03-16",
            "https://telegra.ph/work-5-03-16",
            "https://telegra.ph/work-6-03-16",
            "https://telegra.ph/work-7-03-16",
            "https://telegra.ph/work-8-03-16",
            "https://telegra.ph/work-9-03-16",
            "https://telegra.ph/work-10-03-16",
            "https://telegra.ph/work-11-03-16",
            "https://telegra.ph/work-12-03-16-2",
            "https://telegra.ph/work-13-03-16",
            "https://telegra.ph/work-14-03-16",
            "https://telegra.ph/work-15-03-16",
            "https://telegra.ph/work-16-03-16-2",
            "https://telegra.ph/work-16-03-16",
            "https://telegra.ph/work-18-03-16"
        ];

        // ----- 5 рандомных тем для каждого (можно набор побольше, выберем случайные) -----
        const topicsPool = [
            "🔮 Киберпанк", "💀 Бессмертие", "🩸 Вампиры", "👁️ Иллюминаты", "🌑 Затмение",
            "⚡ Электричество", "🧠 ИИ восстание", "🎭 Маски", "🗝️ Тайны прошлого", "☠️ Яды",
            "🕸️ Паутина", "🔥 Адское пламя", "🌊 Глубины", "🧿 Сглаз", "🍷 Кровавая луна",
            "🏴‍☠️ Призраки", "🎸 Рок-н-ролл", "🦇 Ночные твари", "📿 Проклятия", "🗡️ Клинки"
        ];

        // Функция перемешивания и взятия 5 случайных
        function getRandomTopics(count = 5) {
            const shuffled = [...topicsPool].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }

        // Заполняем сетки тем
        const xammersGrid = document.getElementById('xammersTopics');
        const atlizonGrid = document.getElementById('atlizonTopics');

        function renderTopics(container, person) {
            const topics = getRandomTopics(5);
            container.innerHTML = '';
            topics.forEach(t => {
                const card = document.createElement('div');
                card.className = 'topic-card';
                // иконка плазмы
                card.innerHTML = `<i class="fas ${person === 'x' ? 'fa-biohazard' : 'fa-star-and-crescent'}"></i>${t}`;
                container.appendChild(card);
            });
        }

        renderTopics(xammersGrid, 'x');
        renderTopics(atlizonGrid, 'a');

        // ---- функция построения списка ссылок (вставляется в .work-links) ----
        function buildLinksHTML() {
            let html = '<div class="link-grid">';
            workUrls.forEach(url => {
                html += `<a href="${url}" target="_blank" class="work-link">${url.replace('https://telegra.ph/', '')}</a>`;
            });
            html += '</div>';
            return html;
        }

        const linksHTML = buildLinksHTML();

        // Вставляем в оба контейнера (скрыты изначально)
        const workLinksX = document.getElementById('workLinksX');
        const workLinksA = document.getElementById('workLinksA');
        workLinksX.innerHTML = linksHTML;
        workLinksA.innerHTML = linksHTML;

        // ---- обработчики кнопок WORK (показать/скрыть ссылки) ----
        const btnX = document.getElementById('workBtnX');
        const btnA = document.getElementById('workBtnA');

        // Функция toggle с закрытием другого при переключении табов? но проще:
        function toggleLinks(btn, linksContainer) {
            // если уже показаны — скрываем, иначе показываем (и можно скрыть другие)
            const isVisible = linksContainer.classList.contains('show');
            // Скрываем оба контейнера (чтобы одновременно не висели)
            workLinksX.classList.remove('show');
            workLinksA.classList.remove('show');
            if (!isVisible) {
                linksContainer.classList.add('show');
            }
        }

        btnX.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleLinks(btnX, workLinksX);
        });

        btnA.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleLinks(btnA, workLinksA);
        });

        // ----- переключение табов (xammers / atlizon) -----
        const tabX = document.getElementById('tabXammers');
        const tabA = document.getElementById('tabAtlizon');
        const paneX = document.getElementById('paneXammers');
        const paneA = document.getElementById('paneAtlizon');

        function setActiveTab(active) {
            // сброс классов у кнопок
            tabX.classList.remove('active');
            tabA.classList.remove('active');
            paneX.classList.remove('active-pane');
            paneA.classList.remove('active-pane');

            if (active === 'x') {
                tabX.classList.add('active');
                paneX.classList.add('active-pane');
            } else {
                tabA.classList.add('active');
                paneA.classList.add('active-pane');
            }

            // при смене таба скрываем ссылки (чтобы не путать)
            workLinksX.classList.remove('show');
            workLinksA.classList.remove('show');
        }

        tabX.addEventListener('click', () => setActiveTab('x'));
        tabA.addEventListener('click', () => setActiveTab('a'));

        // ----- эффект капающей крови уже в css, доп. нетривиально: -----
        // дополнительно можно добавить иконки капель на кнопки, но всё есть.

        // ----- подгрузка avatar1.jpg / avatar2.jpg – уже в img src, если нет – будет заглушка

        // ----- дополнительная рандомизация тем при загрузке (уже сделана) -----
        // но по желанию можно обновлять темы при клике на них? но не требуется.

        // Также адаптив, все кнопки видны.
        // Убедимся, что .work-btn не перекрыт.
        // На мобильных всё ок.

        // Инициализация: показываем панель xammers
        setActiveTab('x');
    })();
</script>

<!-- Дополнительная магия: если music.mp3 отсутствует, плеер покажет элементы управления, но тишина.
     пользователь сможет добавить music.mp3 или music.ogg в корень. 
     music.html может быть загружен отдельно, но для воспроизведения мы используем стандартный тег audio -->
</body>
    </html>
