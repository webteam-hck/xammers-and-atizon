<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xammers · atlizon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0c0a0c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            transition: background-color 0.3s;
        }

        .main-panel {
            max-width: 1200px;
            width: 100%;
            background: rgba(16, 12, 18, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid var(--main-border, #a55);
            border-radius: 60px 60px 50px 50px;
            box-shadow: 0 20px 50px #200, 0 0 0 3px var(--main-glow, #c66) inset;
            padding: 30px;
        }

        /* верхняя панель с аватарами */
        .top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .avatars {
            display: flex;
            gap: 30px;
        }

        .avatar-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1a131f;
            padding: 8px 25px 8px 15px;
            border-radius: 60px;
            border: 2px solid var(--avatar-border, #b55);
            box-shadow: 0 6px 0 #522;
        }

        .avatar-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--avatar-border, #c66);
            object-fit: cover;
            background: #2e1e2e;
        }

        .avatar-name {
            font-size: 1.8rem;
            font-weight: 800;
            text-shadow: 0 0 10px currentColor;
        }
        .xammers .avatar-name { color: #ff9f9f; }
        .atlizon .avatar-name { color: #cfb0ff; }

        /* музыка */
        .music-box {
            display: none; /* скрыто по умолчанию, покажем если файл есть */
            align-items: center;
            gap: 15px;
            background: #1e1522;
            border-radius: 60px;
            padding: 8px 20px;
            border: 2px solid var(--music-border, #b44);
        }
        .music-icon {
            color: #f77;
            font-size: 2rem;
            animation: spin 4s infinite linear;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        audio {
            height: 40px;
            width: 200px;
            filter: hue-rotate(290deg) brightness(1.2);
        }

        /* табы */
        .tab-container {
            display: flex;
            gap: 20px;
            border-bottom: 4px solid var(--tab-bottom, #b44);
            padding-bottom: 12px;
            margin-bottom: 30px;
        }
        .tab {
            background: transparent;
            border: none;
            color: #ebb;
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 10px 30px;
            cursor: pointer;
            border-radius: 40px 40px 0 0;
            transition: 0.2s;
            text-shadow: 0 2px 0 black;
        }
        .tab.active {
            background: var(--tab-active, #a33);
            color: white;
            box-shadow: 0 -4px 20px var(--tab-glow, #f66);
        }
        .tab:hover {
            background: #4a2a2a;
            color: #fcc;
        }

        /* контент */
        .content-pane {
            display: none;
            background: #151015;
            border-radius: 40px;
            padding: 30px;
            border: 2px solid var(--content-border, #b55);
        }
        .content-pane.active {
            display: block;
        }

        /* инфо карточки (канал и dm) */
        .info-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }
        .info-card {
            background: #1f1822;
            border: 3px solid var(--card-border, #a55);
            border-radius: 40px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 0 var(--card-shadow, #633);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .info-label {
            color: #fbb;
            font-size: 1.6rem;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .info-link {
            display: inline-block;
            background: #2c1d2c;
            color: #ffd6d6;
            font-size: 1.6rem;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid var(--link-border, #c77);
            transition: 0.2s;
        }
        .info-link:hover {
            background: #743;
            border-color: #faa;
            transform: scale(1.02);
        }

        /* заголовок темы */
        .theme-title {
            color: #fcc;
            font-size: 2.2rem;
            margin: 30px 0 20px;
            border-left: 10px solid var(--title-line, #c66);
            padding-left: 20px;
            text-transform: uppercase;
        }

        /* сетка тем 5 штук */
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }
        .theme-card {
            background: #281f28;
            border: 2px solid var(--theme-border, #b55);
            border-radius: 30px;
            padding: 20px 5px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffe0e0;
            cursor: pointer;
            box-shadow: 0 7px 0 var(--theme-shadow, #633);
            transition: 0.15s;
        }
        .theme-card i {
            font-size: 2.2rem;
            display: block;
            margin-bottom: 10px;
            color: #f88;
        }
        .theme-card:hover {
            transform: translateY(-5px);
            border-color: #f77;
            box-shadow: 0 12px 0 #a55;
        }

        /* WORK кнопка */
        .work-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0 20px;
        }
        .work-button {
            position: relative;
            background: #3a1a1a;
            border: 4px solid var(--work-btn-border, #b22);
            color: white;
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            padding: 20px 100px;
            border-radius: 100px;
            letter-spacing: 10px;
            cursor: pointer;
            box-shadow: 0 18px 0 var(--work-btn-shadow, #811), 0 0 40px var(--work-btn-glow, #f66);
            transition: 0.1s;
        }
        .work-button::before, .work-button::after {
            content: "";
            position: absolute;
            top: -20px;
            left: 30%;
            width: 18px;
            height: 28px;
            background: #d33;
            border-radius: 50%;
            filter: blur(4px);
            opacity: 0;
            box-shadow: 0 0 15px red;
        }
        .work-button::after {
            top: auto;
            bottom: -35px;
            left: 70%;
            width: 22px;
            height: 38px;
        }
        .work-button:hover::before {
            opacity: 1;
            animation: drip 0.9s infinite;
        }
        .work-button:hover::after {
            opacity: 1;
            animation: drip 1.2s infinite 0.2s;
        }
        @keyframes drip {
            0% { transform: translateY(0); opacity: 1; }
            80% { transform: translateY(70px); opacity: 0.5; }
            100% { transform: translateY(100px); opacity: 0; }
        }
        .work-button:hover {
            background: #6b2b2b;
            border-color: #f66;
            transform: scale(1.02);
        }

        /* список ссылок */
        .work-list {
            background: #1f1622;
            border-radius: 50px;
            padding: 30px;
            margin-top: 30px;
            border: 3px dashed var(--list-border, #b66);
            display: none;
            max-height: 400px;
            overflow-y: auto;
            width: 100%;
        }
        .work-list.show {
            display: block;
        }
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
        }
        .work-url {
            display: block;
            background: #2d1f2d;
            color: #fcc;
            padding: 15px 20px;
            border-radius: 40px;
            text-decoration: none;
            border: 2px solid var(--url-border, #b66);
            text-align: center;
            font-weight: 600;
            transition: 0.15s;
        }
        .work-url:hover {
            background: #853;
            color: white;
            border-color: #faa;
        }

        /* нижняя подпись */
        .footer {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: #d88;
            background: #1a121f;
            padding: 20px;
            border-radius: 60px;
            margin-top: 30px;
            border: 2px solid var(--footer-border, #b55);
            text-transform: uppercase;
        }
        .footer span {
            color: #fbb;
            text-shadow: 0 0 15px #f33;
        }

        @media (max-width: 800px) {
            .theme-grid { grid-template-columns: repeat(2,1fr); }
            .info-row { grid-template-columns: 1fr; }
            .work-button { font-size: 2.2rem; padding: 15px 40px; }
        }
    </style>
</head>
<body>
<div class="main-panel">
    <div class="top-row">
        <div class="avatars">
            <div class="avatar-item xammers">
                <img src="avatar1.jpg" alt="xammers" class="avatar-img" onerror="this.src='https://via.placeholder.com/60/a33/fff?text=X'">
                <span class="avatar-name">xammers</span>
            </div>
            <div class="avatar-item atlizon">
                <img src="avatar2.jpg" alt="atlizon" class="avatar-img" onerror="this.src='https://via.placeholder.com/60/73a/fff?text=A'">
                <span class="avatar-name">atlizon</span>
            </div>
        </div>
        <div class="music-box" id="musicContainer">
            <i class="fas fa-compact-disc music-icon"></i>
            <audio id="globalAudio" controls loop>
                <source src="music.mp3" type="audio/mpeg">
            </audio>
        </div>
    </div>

    <div class="tab-container">
        <button class="tab active" id="tabX">XAMMERS</button>
        <button class="tab" id="tabA">ATLIZON</button>
    </div>

    <div class="content-pane active" id="paneX">
        <div class="info-row">
            <div class="info-card">
                <div class="info-label"><i class="fas fa-broadcast-tower"></i> КАНАЛ</div>
                <a href="https://t.me/MenaceLink" target="_blank" class="info-link"><i class="fab fa-telegram"></i> @MenaceLink</a>
            </div>
            <div class="info-card">
                <div class="info-label"><i class="fas fa-envelope"></i> DM</div>
                <a href="https://t.me/xammepc" target="_blank" class="info-link"><i class="fab fa-telegram"></i> @xammepc</a>
            </div>
        </div>

        <div class="theme-title"><i class="fas fa-bolt"></i> темы xammers · хаос</div>
        <div class="theme-grid" id="xThemes"></div>

        <div class="work-area">
            <button class="work-button" id="workBtnX"><i class="fas fa-tint"></i> WORK</button>
            <div class="work-list" id="workListX"></div>
        </div>
    </div>

    <div class="content-pane" id="paneA">
        <div class="info-row">
            <div class="info-card">
                <div class="info-label"><i class="fas fa-broadcast-tower"></i> КАНАЛ</div>
                <a href="https://t.me/MenaceLink" target="_blank" class="info-link"><i class="fab fa-telegram"></i> @MenaceLink</a>
            </div>
            <div class="info-card">
                <div class="info-label"><i class="fas fa-envelope"></i> DM</div>
                <a href="https://t.me/atlizup" target="_blank" class="info-link"><i class="fab fa-telegram"></i> @atlizup</a>
            </div>
        </div>

        <div class="theme-title"><i class="fas fa-moon"></i> темы atlizon · мистика</div>
        <div class="theme-grid" id="aThemes"></div>

        <div class="work-area">
            <button class="work-button" id="workBtnA"><i class="fas fa-tint"></i> WORK</button>
            <div class="work-list" id="workListA"></div>
        </div>
    </div>

    <div class="footer">
        <span>🩸 adapt xammers and atlizon 🩸</span>
    </div>
</div>

<script>
    (function() {
        // ========== МУЗЫКА (Логика наличия файла) ==========
        const audio = document.getElementById('globalAudio');
        const musicContainer = document.getElementById('musicContainer');
        
        // Проверяем, существует ли файл music.mp3
        fetch('music.mp3', { method: 'HEAD' })
            .then(response => {
                if (response.ok) {
                    musicContainer.style.display = 'flex'; // Показываем плеер
                    audio.volume = 0.5;
                    
                    // Автоплей при первом клике (требование браузеров)
                    const playAudio = () => {
                        audio.play().catch(() => {});
                        document.removeEventListener('click', playAudio);
                    };
                    document.addEventListener('click', playAudio);
                }
            })
            .catch(() => console.log('Music file not found.'));

        // ========== СПИСОК WORK ССЫЛОК ==========
        const workUrls = [
            "https://telegra.ph/Work-1-03-16", "https://telegra.ph/work-2-03-16", "https://telegra.ph/work-3-03-16",
            "https://telegra.ph/work-4-03-16", "https://telegra.ph/work-5-03-16", "https://telegra.ph/work-6-03-16",
            "https://telegra.ph/work-7-03-16", "https://telegra.ph/work-8-03-16", "https://telegra.ph/work-9-03-16",
            "https://telegra.ph/work-10-03-16", "https://telegra.ph/work-11-03-16", "https://telegra.ph/work-12-03-16-2",
            "https://telegra.ph/work-13-03-16", "https://telegra.ph/work-14-03-16", "https://telegra.ph/work-15-03-16",
            "https://telegra.ph/work-16-03-16-2", "https://telegra.ph/work-16-03-16", "https://telegra.ph/work-18-03-16"
        ];

        function buildLinks() {
            let html = '<div class="link-grid">';
            workUrls.forEach(url => {
                let display = url.replace('https://telegra.ph/', '');
                html += `<a href="${url}" target="_blank" class="work-url">${display}</a>`;
            });
            html += '</div>';
            return html;
        }
        document.getElementById('workListX').innerHTML = buildLinks();
        document.getElementById('workListA').innerHTML = buildLinks();

        // ========== ТЕМЫ ==========
        const themeNames = [
            'Адское пламя', 'Киберпанк', 'Яды', 'Затмение', 'Кровавая луна',
            'Некрополис', 'Ночные твари', 'ИИ восстание', 'Глубины', 'Маски'
        ];

        function getRandomThemes() {
            return [...themeNames].sort(() => 0.5 - Math.random()).slice(0, 5);
        }

        const colorSchemes = {
            'Адское пламя': { main: '#c44', bg: '#2f120a', border: '#e77', active: '#b33', glow: '#f99' },
            'Киберпанк': { main: '#5fa0ff', bg: '#0a1122', border: '#7fb0ff', active: '#3f7fdf', glow: '#aac9ff' },
            'Яды': { main: '#8bc34a', bg: '#1a2a0f', border: '#9fdf6f', active: '#5f9f2f', glow: '#b0ff8f' },
            'Затмение': { main: '#9b6b9b', bg: '#1c1122', border: '#b88bb8', active: '#7a4f7a', glow: '#d6a5d6' },
            'Кровавая луна': { main: '#b44', bg: '#1f0b0b', border: '#d77', active: '#a33', glow: '#faa' },
            'Некрополис': { main: '#7a7a7a', bg: '#181818', border: '#aaa', active: '#5a5a5a', glow: '#ccc' },
            'Ночные твари': { main: '#9f6fcf', bg: '#18122a', border: '#b88bef', active: '#7a4faf', glow: '#d7b0ff' },
            'ИИ восстание': { main: '#4fc3aa', bg: '#0f2620', border: '#7fe0c4', active: '#2f9f8a', glow: '#a7f0dd' },
            'Глубины': { main: '#5fa7c4', bg: '#0a2535', border: '#7fc0df', active: '#2f7f9f', glow: '#a7dbff' },
            'Маски': { main: '#cf9f6f', bg: '#2a1e15', border: '#efc09f', active: '#af7f4f', glow: '#ffdbb5' }
        };

        function applyTheme(themeName) {
            const colors = colorSchemes[themeName] || colorSchemes['Кровавая луна'];
            document.body.style.backgroundColor = colors.bg;
            document.documentElement.style.setProperty('--main-border', colors.border);
            document.documentElement.style.setProperty('--main-glow', colors.glow);
            document.documentElement.style.setProperty('--avatar-border', colors.main);
            document.documentElement.style.setProperty('--music-border', colors.main);
            document.documentElement.style.setProperty('--tab-bottom', colors.main);
            document.documentElement.style.setProperty('--tab-active', colors.active);
            document.documentElement.style.setProperty('--tab-glow', colors.glow);
            document.documentElement.style.setProperty('--content-border', colors.border);
            document.documentElement.style.setProperty('--card-border', colors.main);
            document.documentElement.style.setProperty('--card-shadow', colors.active);
            document.documentElement.style.setProperty('--link-border', colors.main);
            document.documentElement.style.setProperty('--title-line', colors.main);
            document.documentElement.style.setProperty('--theme-border', colors.border);
            document.documentElement.style.setProperty('--theme-shadow', colors.active);
            document.documentElement.style.setProperty('--work-btn-border', colors.main);
            document.documentElement.style.setProperty('--work-btn-shadow', colors.active);
            document.documentElement.style.setProperty('--work-btn-glow', colors.glow);
            document.documentElement.style.setProperty('--list-border', colors.border);
            document.documentElement.style.setProperty('--url-border', colors.main);
            document.documentElement.style.setProperty('--footer-border', colors.border);
        }

        function fillThemes(containerId, icon) {
            const container = document.getElementById(containerId);
            const themes = getRandomThemes();
            container.innerHTML = '';
            themes.forEach(t => {
                const card = document.createElement('div');
                card.className = 'theme-card';
                card.innerHTML = `<i class="fas ${icon}"></i>${t}`;
                card.addEventListener('click', () => applyTheme(t));
                container.appendChild(card);
            });
        }
        fillThemes('xThemes', 'fa-biohazard');
        fillThemes('aThemes', 'fa-star-and-crescent');

        // ========== КНОПКИ WORK ==========
        const workX = document.getElementById('workBtnX');
        const workA = document.getElementById('workBtnA');
        const listX = document.getElementById('workListX');
        const listA = document.getElementById('workListA');

        workX.addEventListener('click', () => {
            listA.classList.remove('show');
            listX.classList.toggle('show');
        });
        workA.addEventListener('click', () => {
            listX.classList.remove('show');
            listA.classList.toggle('show');
        });

        // ========== ПЕРЕКЛЮЧЕНИЕ ТАБОВ ==========
        const tabX = document.getElementById('tabX');
        const tabA = document.getElementById('tabA');
        const paneX = document.getElementById('paneX');
        const paneA = document.getElementById('paneA');

        tabX.addEventListener('click', () => {
            tabX.classList.add('active');
            tabA.classList.remove('active');
            paneX.classList.add('active');
            paneA.classList.remove('active');
            listX.classList.remove('show');
            listA.classList.remove('show');
        });

        tabA.addEventListener('click', () => {
            tabA.classList.add('active');
            tabX.classList.remove('active');
            paneA.classList.add('active');
            paneX.classList.remove('active');
            listX.classList.remove('show');
            listA.classList.remove('show');
        });
    })();
</script>
</body>
</html>
