<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xammers & atlizon · дуо портал</title>
    <!-- Font Awesome (иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0b0c0e 0%, #1a1d24 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* главная карточка */
        .glass-panel {
            max-width: 1100px;
            width: 100%;
            background: rgba(20, 22, 27, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 70, 70, 0.25);
            border-radius: 48px 48px 36px 36px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(180, 40, 40, 0.3) inset;
            padding: 28px 28px 35px;
            transition: all 0.2s;
        }

        /* шапка с аватарками и музыкой */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .avatars {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .avatar-block {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 20px 8px 12px;
            border-radius: 60px;
            border: 1px solid #9f2b2b;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
        }

        .avatar-img {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #c44;
            background: #2a1e1e;
        }

        .avatar-name {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 1px;
            text-shadow: 0 0 6px #f44;
        }

        .xammers .avatar-name { color: #ff7b7b; }
        .atlizon .avatar-name { color: #b5a0ff; }

        /* музыка автоматическая, плеер скрыт */
        .hidden-audio {
            display: none;
        }

        /* табы (основная навигация) */
        .tabs {
            display: flex;
            gap: 20px;
            border-bottom: 3px solid #882222;
            padding-bottom: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #ccc;
            font-size: 1.7rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 10px 25px;
            cursor: pointer;
            border-radius: 40px 40px 0 0;
            letter-spacing: 1.5px;
            transition: 0.2s;
            position: relative;
            overflow: hidden;
            text-shadow: 0 2px 3px black;
        }

        .tab-btn.active {
            color: white;
            background: #902020;
            box-shadow: 0 -2px 15px #f33;
        }

        .tab-btn:not(.active):hover {
            color: #ffa0a0;
            background: rgba(150, 40, 40, 0.4);
        }

        /* контент табов */
        .tab-content {
            background: rgba(12, 10, 16, 0.7);
            border-radius: 36px;
            padding: 28px 24px;
            border: 1px solid #a33;
            margin-bottom: 30px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.7);
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active-pane {
            display: block;
        }

        /* заголовки внутри табов */
        .section-title {
            color: #ffb7b7;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 28px;
            border-left: 10px solid #c44;
            padding-left: 20px;
            text-transform: uppercase;
        }

        /* сетка тем (5 штук) — ТЕПЕРЬ КЛИКАБЕЛЬНЫЕ */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 18px;
            margin-bottom: 40px;
        }

        .topic-card {
            background: #2c222a;
            border: 2px solid #6f3030;
            border-radius: 30px;
            padding: 18px 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1.25rem;
            color: #ffd9b0;
            transition: 0.2s;
            box-shadow: 0 7px 0 #3f1c1c;
            cursor: pointer; /* стал указатель, потому что темы РАБОТАЮТ */
            backdrop-filter: blur(4px);
        }

        .topic-card i {
            display: block;
            font-size: 2rem;
            margin-bottom: 8px;
            color: #d66;
        }

        .topic-card:hover {
            transform: translateY(-4px);
            border-color: #f66;
            box-shadow: 0 11px 0 #6f2b2b;
        }

        /* всплывающее уведомление (темы работают) */
        .topic-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c0a0a;
            border: 3px solid #b33;
            color: #ffcaca;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 2px;
            box-shadow: 0 0 30px #f33;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .topic-toast.show {
            opacity: 1;
        }

        /* КНОПКА WORK (с эффектом капающей крови) */
        .work-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 25px 0 20px;
        }

        .work-btn {
            position: relative;
            background: #2c0f0f;
            border: 3px solid #a00;
            color: white;
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            padding: 20px 70px;
            border-radius: 80px;
            letter-spacing: 8px;
            cursor: pointer;
            box-shadow: 0 15px 0 #4d0f0f, 0 0 30px #d00;
            transition: 0.05s linear;
            z-index: 5;
            overflow: visible;
            line-height: 1;
        }

        /* эффект капающей крови */
        .work-btn::before,
        .work-btn::after {
            content: "";
            position: absolute;
            top: -15px;
            left: 20%;
            width: 12px;
            height: 20px;
            background: #c22;
            border-radius: 50%;
            filter: blur(2px);
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 12px red;
            z-index: 2;
        }

        .work-btn::after {
            top: auto;
            bottom: -25px;
            left: 70%;
            width: 18px;
            height: 30px;
            background: #b11;
        }

        .work-btn:hover::before {
            opacity: 1;
            animation: dripLeft 0.8s infinite;
        }

        .work-btn:hover::after {
            opacity: 1;
            animation: dripRight 1s infinite 0.2s;
        }

        @keyframes dripLeft {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            80% { transform: translateY(50px) scale(0.7); opacity: 0.7; }
            100% { transform: translateY(70px) scale(0.3); opacity: 0; }
        }

        @keyframes dripRight {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            80% { transform: translateY(-50px) scale(0.8); opacity: 0.6; }
            100% { transform: translateY(-80px) scale(0.2); opacity: 0; }
        }

        .work-btn:hover {
            transform: scale(1.02);
            background: #551818;
            border-color: #f33;
        }

        /* контейнер со списком ссылок */
        .work-links {
            background: #1f1722;
            border-radius: 40px;
            padding: 25px 25px;
            margin-top: 25px;
            border: 2px dashed #a55;
            display: none;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: inset 0 0 20px #2a0f0f;
        }

        .work-links.show {
            display: block;
        }

        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px;
        }

        .work-link {
            display: block;
            background: #2d1e2a;
            color: #ffbcbc;
            padding: 16px 20px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid #b44;
            transition: 0.15s;
            word-break: break-all;
            text-align: center;
        }

        .work-link:hover {
            background: #732;
            color: white;
            border-color: #f88;
            transform: scale(1.02);
        }

        /* нижняя подпись */
        .signature {
            text-align: center;
            margin-top: 30px;
            font-size: 2rem;
            font-weight: 800;
            color: #b55;
            background: rgba(0,0,0,0.5);
            padding: 16px 10px;
            border-radius: 60px;
            border: 1px solid #933;
            text-transform: uppercase;
            letter-spacing: 4px;
            word-break: break-word;
        }

        .signature span {
            color: #faa;
            text-shadow: 0 0 10px #f33;
        }

        /* скролл */
        .work-links::-webkit-scrollbar {
            width: 12px;
        }

        .work-links::-webkit-scrollbar-track {
            background: #2d1b1b;
        }

        .work-links::-webkit-scrollbar-thumb {
            background: #a33;
            border-radius: 20px;
        }

        @media (max-width: 700px) {
            .work-btn { font-size: 2rem; padding: 15px 30px; }
            .signature { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <!-- верх: аватарки + СКРЫТЫЙ АВТОМАТИЧЕСКИЙ ПЛЕЕР -->
    <div class="top-bar">
        <div class="avatars">
            <!-- xammers -->
            <div class="avatar-block xammers">
                <img src="avatar1.jpg" alt="xammers" class="avatar-img" onerror="this.src='https://via.placeholder.com/52/a33/fff?text=X'">
                <span class="avatar-name">xammers</span>
            </div>
            <!-- atlizon -->
            <div class="avatar-block atlizon">
                <img src="avatar2.jpg" alt="atlizon" class="avatar-img" onerror="this.src='https://via.placeholder.com/52/63a/fff?text=A'">
                <span class="avatar-name">atlizon</span>
            </div>
        </div>

        <!-- скрытый аудио с автоплеем (без элементов управления) -->
        <audio id="bgMusic" class="hidden-audio" autoplay loop playsinline>
            <source src="music.mp3" type="audio/mpeg">
            <source src="music.ogg" type="audio/ogg">
            <!-- если нет файла – браузер промолчит, но плеер скрыт и автоматический -->
        </audio>

        <!-- просто иконка звука (ненавязчивая) для красоты, но плеера нет -->
        <div class="music-icon" style="color:#b44; font-size:2rem;"><i class="fas fa-music"></i></div>
    </div>

    <!-- Табы: xammers / atlizon -->
    <div class="tabs">
        <button class="tab-btn active" id="tabXammers"><i class="fas fa-skull"></i> XAMMERS</button>
        <button class="tab-btn" id="tabAtlizon"><i class="fas fa-dragon"></i> ATLIZON</button>
    </div>

    <!-- Контейнер с переключаемым содержимым -->
    <div class="tab-content">
        <!-- ПАНЕЛЬ XAMMERS -->
        <div class="tab-pane active-pane" id="paneXammers">
            <div class="section-title"><i class="fas fa-bolt"></i> темы xammers · хаос</div>
            <!-- 5 рандомных тем для xammers (сгенерируются через js) -->
            <div class="topics-grid" id="xammersTopics"></div>
            <!-- Кнопка WORK + ссылки -->
            <div class="work-wrapper">
                <button class="work-btn" id="workBtnX"><i class="fas fa-tint"></i> WORK</button>
                <div class="work-links" id="workLinksX"></div>
            </div>
        </div>

        <!-- ПАНЕЛЬ ATLIZON -->
        <div class="tab-pane" id="paneAtlizon">
            <div class="section-title"><i class="fas fa-moon"></i> темы atlizon · мистика</div>
            <div class="topics-grid" id="atlizonTopics"></div>
            <div class="work-wrapper">
                <button class="work-btn" id="workBtnA"><i class="fas fa-tint"></i> WORK</button>
                <div class="work-links" id="workLinksA"></div>
            </div>
        </div>
    </div>

    <!-- надпись adapt xammers and atlizon -->
    <div class="signature">
        <span>🩸 adapt xammers and atlizon 🩸</span>
    </div>
</div>

<!-- тост для уведомления что тема работает -->
<div id="topicToast" class="topic-toast">🔥 тема активирована</div>

<script>
    (function() {
        // ----- СПИСОК ССЫЛОК -----
        const workUrls = [
            "https://telegra.ph/Work-1-03-16",
            "https://telegra.ph/work-2-03-16",
            "https://telegra.ph/work-3-03-16",
            "https://telegra.ph/work-4-03-16",
            "https://telegra.ph/work-5-03-16",
            "https://telegra.ph/work-6-03-16",
            "https://telegra.ph/work-7-03-16",
            "https://telegra.ph/work-8-03-16",
            "https://telegra.ph/work-9-03-16",
            "https://telegra.ph/work-10-03-16",
            "https://telegra.ph/work-11-03-16",
            "https://telegra.ph/work-12-03-16-2",
            "https://telegra.ph/work-13-03-16",
            "https://telegra.ph/work-14-03-16",
            "https://telegra.ph/work-15-03-16",
            "https://telegra.ph/work-16-03-16-2",
            "https://telegra.ph/work-16-03-16",
            "https://telegra.ph/work-18-03-16"
        ];

        // ----- ПУЛ ТЕМ (для генерации 5 случайных) -----
        const topicsPool = [
            "🔮 Киберпанк", "💀 Бессмертие", "🩸 Вампиры", "👁️ Иллюминаты", "🌑 Затмение",
            "⚡ Электричество", "🧠 ИИ восстание", "🎭 Маски", "🗝️ Тайны прошлого", "☠️ Яды",
            "🕸️ Паутина", "🔥 Адское пламя", "🌊 Глубины", "🧿 Сглаз", "🍷 Кровавая луна",
            "🏴‍☠️ Призраки", "🎸 Рок-н-ролл", "🦇 Ночные твари", "📿 Проклятия", "🗡️ Клинки",
            "⚙️ Механизмы", "📡 Чужие", "🧬 Мутации", "🪦 Забвение", "🌋 Извержение"
        ];

        // Функция получения 5 случайных тем
        function getRandomTopics(count = 5) {
            const shuffled = [...topicsPool].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }

        // Заполняем сетки тем и делаем их КЛИКАБЕЛЬНЫМИ (работают)
        const xammersGrid = document.getElementById('xammersTopics');
        const atlizonGrid = document.getElementById('atlizonTopics');

        // тост
        const toast = document.getElementById('topicToast');

        function showToastMessage(text) {
            toast.textContent = '🔥 ' + text + ' активирована';
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        function renderTopics(container, personName) {
            const topics = getRandomTopics(5);
            container.innerHTML = '';
            topics.forEach(t => {
                const card = document.createElement('div');
                card.className = 'topic-card';
                // иконка в зависимости от персонажа
                const icon = (personName === 'xammers') ? 'fa-biohazard' : 'fa-star-and-crescent';
                card.innerHTML = `<i class="fas ${icon}"></i>${t}`;
                // при клике показываем, что тема работает
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // тема РАБОТАЕТ: показываем всплывашку с названием темы
                    showToastMessage(t);
                });
                container.appendChild(card);
            });
        }

        renderTopics(xammersGrid, 'xammers');
        renderTopics(atlizonGrid, 'atlizon');

        // ---- функция построения списка ссылок ----
        function buildLinksHTML() {
            let html = '<div class="link-grid">';
            workUrls.forEach(url => {
                html += `<a href="${url}" target="_blank" class="work-link">${url.replace('https://telegra.ph/', '')}</a>`;
            });
            html += '</div>';
            return html;
        }

        const linksHTML = buildLinksHTML();

        // Вставляем ссылки в оба контейнера
        const workLinksX = document.getElementById('workLinksX');
        const workLinksA = document.getElementById('workLinksA');
        workLinksX.innerHTML = linksHTML;
        workLinksA.innerHTML = linksHTML;

        // ---- обработчики кнопок WORK (показать/скрыть ссылки) ----
        const btnX = document.getElementById('workBtnX');
        const btnA = document.getElementById('workBtnA');

        function toggleLinks(btn, linksContainer) {
            const isVisible = linksContainer.classList.contains('show');
            // Скрываем оба контейнера (чтобы одновременно не висели)
            workLinksX.classList.remove('show');
            workLinksA.classList.remove('show');
            if (!isVisible) {
                linksContainer.classList.add('show');
            }
        }

        btnX.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleLinks(btnX, workLinksX);
        });

        btnA.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleLinks(btnA, workLinksA);
        });

        // ----- переключение табов (xammers / atlizon) -----
        const tabX = document.getElementById('tabXammers');
        const tabA = document.getElementById('tabAtlizon');
        const paneX = document.getElementById('paneXammers');
        const paneA = document.getElementById('paneAtlizon');

        function setActiveTab(active) {
            tabX.classList.remove('active');
            tabA.classList.remove('active');
            paneX.classList.remove('active-pane');
            paneA.classList.remove('active-pane');

            if (active === 'x') {
                tabX.classList.add('active');
                paneX.classList.add('active-pane');
            } else {
                tabA.classList.add('active');
                paneA.classList.add('active-pane');
            }

            // при смене таба скрываем ссылки (чтобы не путать)
            workLinksX.classList.remove('show');
            workLinksA.classList.remove('show');
        }

        tabX.addEventListener('click', () => setActiveTab('x'));
        tabA.addEventListener('click', () => setActiveTab('a'));

        // инициализация: xammers активен
        setActiveTab('x');

        // ----- автоматическая музыка: плеер скрыт, играет фоном -----
        // дополнительно: попытаемся заставить автоплей сработать в любом браузере
        const audio = document.getElementById('bgMusic');
        // если автоплей заблокирован, попробуем запустить после первого взаимодействия
        // но по заданию "играет автоматически" — большинство браузеров глушат автоплей без взаимодействия.
        // Добавим "ловушку": если аудио не играет, запустим после первого тапа (но сохраним скрытость)
        document.body.addEventListener('click', function initAudio() {
            if (audio.paused) {
                audio.play().catch(e => console.log('autoplay prevented but user clicked'));
            }
        }, { once: true }); // сработает при первом клике в любом месте
        // также попробуем сразу запустить (на всякий случай)
        audio.play().catch(() => {}); 
    })();
</script>

</body>
</html>
