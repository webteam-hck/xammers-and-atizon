<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xammers · atlizon · дуо портал</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #0f0b0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            transition: background 0.3s;
        }

        .glass-panel {
            max-width: 1200px;
            width: 100%;
            background: rgba(18, 14, 20, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid #a55;
            border-radius: 50px 50px 40px 40px;
            box-shadow: 0 20px 50px #200, 0 0 0 2px #c66 inset;
            padding: 30px;
        }

        /* шапка с аватарами */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .avatars {
            display: flex;
            gap: 30px;
        }

        .avatar-block {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1e151e;
            padding: 8px 25px 8px 15px;
            border-radius: 60px;
            border: 2px solid #c44;
            box-shadow: 0 5px 0 #622;
        }

        .avatar-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #d55;
            background: #332222;
        }

        .avatar-name {
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: 1px;
            text-shadow: 0 0 10px currentColor;
        }
        .xammers .avatar-name { color: #ff8a8a; }
        .atlizon .avatar-name { color: #c9adff; }

        /* плеер */
        .music-area {
            background: #221a22;
            border-radius: 60px;
            padding: 10px 20px;
            border: 2px solid #b44;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 5px 0 #633;
        }
        .music-icon {
            color: #f77;
            font-size: 2rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { text-shadow: 0 0 5px #f55; }
            50% { text-shadow: 0 0 25px #f33; }
            100% { text-shadow: 0 0 5px #f55; }
        }
        audio {
            height: 40px;
            filter: hue-rotate(310deg) brightness(1.2);
            border-radius: 30px;
        }

        /* табы */
        .tabs {
            display: flex;
            gap: 20px;
            border-bottom: 4px solid #b44;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #dbb;
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 10px 30px;
            cursor: pointer;
            border-radius: 40px 40px 0 0;
            transition: 0.2s;
            text-shadow: 0 2px 0 #000;
        }
        .tab-btn.active {
            color: white;
            background: #a33;
            box-shadow: 0 -4px 20px #f66;
        }
        .tab-btn:hover {
            background: #632;
            color: #fcc;
        }

        .tab-content {
            background: #181218;
            border-radius: 40px;
            padding: 30px;
            border: 2px solid #c66;
            margin-bottom: 30px;
        }
        .tab-pane { display: none; }
        .tab-pane.active-pane { display: block; }

        /* блоки информации */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }
        .info-card {
            background: #231f23;
            border: 3px solid #a44;
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 0 #522;
        }
        .info-label {
            color: #fbb;
            font-size: 1.5rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }
        .info-link {
            display: inline-block;
            background: #331d1d;
            color: #fdd;
            font-size: 1.4rem;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid #d66;
            transition: 0.2s;
            word-break: break-all;
        }
        .info-link:hover {
            background: #722;
            color: white;
            border-color: #f88;
            transform: scale(1.02);
        }
        .info-link i {
            margin-right: 10px;
            color: #faa;
        }

        /* темы (5 карточек) */
        .section-title {
            color: #fcc;
            font-size: 2rem;
            margin: 30px 0 20px;
            border-left: 10px solid #d66;
            padding-left: 20px;
        }
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .topic-card {
            background: #2a202a;
            border: 2px solid #b55;
            border-radius: 30px;
            padding: 20px 5px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffcfcf;
            cursor: pointer;
            box-shadow: 0 7px 0 #633;
            transition: 0.15s;
        }
        .topic-card i {
            font-size: 2.2rem;
            display: block;
            margin-bottom: 8px;
            color: #e77;
        }
        .topic-card:hover {
            transform: translateY(-5px);
            border-color: #f77;
            box-shadow: 0 12px 0 #944;
        }

        /* WORK кнопка + ссылки */
        .work-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px 0;
        }
        .work-btn {
            position: relative;
            background: #3f1a1a;
            border: 4px solid #b22;
            color: white;
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            padding: 20px 90px;
            border-radius: 90px;
            letter-spacing: 8px;
            cursor: pointer;
            box-shadow: 0 15px 0 #611, 0 0 40px #f44;
            transition: 0.1s;
        }
        .work-btn::before, .work-btn::after {
            content: "";
            position: absolute;
            top: -20px;
            left: 25%;
            width: 15px;
            height: 25px;
            background: #d22;
            border-radius: 50%;
            filter: blur(3px);
            opacity: 0;
            box-shadow: 0 0 15px red;
        }
        .work-btn::after {
            top: auto;
            bottom: -30px;
            left: 70%;
            width: 20px;
            height: 35px;
        }
        .work-btn:hover::before {
            opacity: 1;
            animation: drip 0.9s infinite;
        }
        .work-btn:hover::after {
            opacity: 1;
            animation: drip 1.2s infinite 0.2s;
        }
        @keyframes drip {
            0% { transform: translateY(0); opacity: 1; }
            80% { transform: translateY(60px); opacity: 0.5; }
            100% { transform: translateY(90px); opacity: 0; }
        }
        .work-btn:hover {
            background: #6b2b2b;
            border-color: #f44;
            transform: scale(1.02);
        }

        .work-links {
            background: #1f1522;
            border-radius: 50px;
            padding: 30px;
            margin-top: 30px;
            border: 3px dashed #c66;
            display: none;
            max-height: 400px;
            overflow-y: auto;
        }
        .work-links.show { display: block; }
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        .work-link {
            display: block;
            background: #2f1d2a;
            color: #fcc;
            padding: 15px 20px;
            border-radius: 40px;
            text-decoration: none;
            border: 2px solid #b55;
            text-align: center;
            font-weight: 600;
            transition: 0.15s;
        }
        .work-link:hover {
            background: #943;
            color: white;
            border-color: #faa;
        }

        /* нижняя подпись */
        .signature {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: #d88;
            background: #1a121a;
            padding: 20px;
            border-radius: 60px;
            border: 2px solid #b55;
            text-transform: uppercase;
        }
        .signature span {
            color: #faa;
            text-shadow: 0 0 15px #f33;
        }

        @media (max-width: 900px) {
            .topics-grid { grid-template-columns: repeat(2,1fr); }
            .info-grid { grid-template-columns: 1fr; }
            .work-btn { font-size: 2rem; padding: 15px 40px; }
        }
    </style>
</head>
<body>
<div class="glass-panel">
    <!-- верх с аватарами -->
    <div class="top-bar">
        <div class="avatars">
            <div class="avatar-block xammers">
                <img src="avatar1.jpg" alt="xammers" class="avatar-img" onerror="this.src='https://via.placeholder.com/60/a33/fff?text=X'">
                <span class="avatar-name">xammers</span>
            </div>
            <div class="avatar-block atlizon">
                <img src="avatar2.jpg" alt="atlizon" class="avatar-img" onerror="this.src='https://via.placeholder.com/60/73a/fff?text=A'">
                <span class="avatar-name">atlizon</span>
            </div>
        </div>
        <!-- МУЗЫКАЛЬНЫЙ ПЛЕЕР - ВИДИМЫЙ, ЧТОБЫ ТОЧНО РАБОТАЛ -->
        <div class="music-area">
            <i class="fas fa-compact-disc music-icon"></i>
            <audio id="musicPlayer" controls loop>
                <source src="music.mp3" type="audio/mpeg">
                <source src="music.ogg" type="audio/ogg">
                <source src="music.wav" type="audio/wav">
                <!-- подхватит любой файл в репозитории -->
                Ваш браузер не поддерживает аудио
            </audio>
        </div>
    </div>

    <!-- табы -->
    <div class="tabs">
        <button class="tab-btn active" id="tabX"><i class="fas fa-skull"></i> XAMMERS</button>
        <button class="tab-btn" id="tabA"><i class="fas fa-dragon"></i> ATLIZON</button>
    </div>

    <div class="tab-content">
        <!-- ======== ПАНЕЛЬ XAMMERS ======== -->
        <div class="tab-pane active-pane" id="paneX">
            <!-- канал и дм -->
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-label"><i class="fas fa-broadcast-tower"></i> КАНАЛ</div>
                    <a href="https://t.me/MenaceLink" target="_blank" class="info-link"><i class="fab fa-telegram"></i> @MenaceLink</a>
                </div>
                <div class="info-card">
                    <div class="info-label"><i class="fas fa-envelope"></i> DM</div>
                    <a href="https://t.me/xammepc" target="_blank" class="info-link"><i class="fab fa-telegram"></i> @xammepc</a>
                </div>
            </div>

            <div class="section-title"><i class="fas fa-bolt"></i> темы xammers · хаос</div>
            <div class="topics-grid" id="xTopics"></div>

            <div class="work-wrapper">
                <button class="work-btn" id="workX"><i class="fas fa-tint"></i> WORK</button>
                <div class="work-links" id="linksX"></div>
            </div>
        </div>

        <!-- ======== ПАНЕЛЬ ATLIZON ======== -->
        <div class="tab-pane" id="paneA">
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-label"><i class="fas fa-broadcast-tower"></i> КАНАЛ</div>
                    <a href="https://t.me/MenaceLink" target="_blank" class="info-link"><i class="fab fa-telegram"></i> @MenaceLink</a>
                </div>
                <div class="info-card">
                    <div class="info-label"><i class="fas fa-envelope"></i> DM</div>
                    <a href="https://t.me/atlizup" target="_blank" class="info-link"><i class="fab fa-telegram"></i> @atlizup</a>
                </div>
            </div>

            <div class="section-title"><i class="fas fa-moon"></i> темы atlizon · мистика</div>
            <div class="topics-grid" id="aTopics"></div>

            <div class="work-wrapper">
                <button class="work-btn" id="workA"><i class="fas fa-tint"></i> WORK</button>
                <div class="work-links" id="linksA"></div>
            </div>
        </div>
    </div>

    <div class="signature"><span>🩸 adapt xammers and atlizon 🩸</span></div>
</div>

<script>
    (function() {
        // ========== МУЗЫКА - ГАРАНТИРОВАННО ИГРАЕТ ==========
        const audio = document.getElementById('musicPlayer');
        audio.volume = 0.5;
        // пробуем автоплей
        let playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.catch(() => {
                // если заблокировано, показываем сообщение и играем после клика
                console.log('нажми play в плеере');
            });
        }

        // ========== СПИСОК ССЫЛОК WORK ==========
        const workUrls = [
            "https://telegra.ph/Work-1-03-16", "https://telegra.ph/work-2-03-16", "https://telegra.ph/work-3-03-16",
            "https://telegra.ph/work-4-03-16", "https://telegra.ph/work-5-03-16", "https://telegra.ph/work-6-03-16",
            "https://telegra.ph/work-7-03-16", "https://telegra.ph/work-8-03-16", "https://telegra.ph/work-9-03-16",
            "https://telegra.ph/work-10-03-16", "https://telegra.ph/work-11-03-16", "https://telegra.ph/work-12-03-16-2",
            "https://telegra.ph/work-13-03-16", "https://telegra.ph/work-14-03-16", "https://telegra.ph/work-15-03-16",
            "https://telegra.ph/work-16-03-16-2", "https://telegra.ph/work-16-03-16", "https://telegra.ph/work-18-03-16"
        ];

        // ========== 5 РАНДОМНЫХ ТЕМ ==========
        const themeNames = [
            '🩸 Кровавая луна', '💀 Некрополис', '🔮 Киберпанк', '🌑 Затмение', '🔥 Адское пламя',
            '🧠 ИИ восстание', '🦇 Ночные твари', '☠️ Яды', '🌊 Глубины', '🎭 Маски',
            '⚡ Электричество', '👁️ Иллюминаты', '🗡️ Клинки', '🍷 Вампиры', '📿 Проклятия'
        ];

        function getRandomThemes(count) {
            return [...themeNames].sort(() => 0.5 - Math.random()).slice(0, count);
        }

        // заполнение сеток (темы просто для красоты, но можно сделать кликабельными)
        function fillTopics(containerId, icon) {
            const cont = document.getElementById(containerId);
            const themes = getRandomThemes(5);
            cont.innerHTML = '';
            themes.forEach(t => {
                const card = document.createElement('div');
                card.className = 'topic-card';
                card.innerHTML = `<i class="fas ${icon}"></i>${t}`;
                // при клике меняем фон (просто для интерактива)
                card.addEventListener('click', () => {
                    document.body.style.backgroundColor = `hsl(${Math.random()*360}, 30%, 10%)`;
                });
                cont.appendChild(card);
            });
        }
        fillTopics('xTopics', 'fa-biohazard');
        fillTopics('aTopics', 'fa-star-and-crescent');

        // ========== ССЫЛКИ WORK ==========
        function buildLinks() {
            let html = '<div class="link-grid">';
            workUrls.forEach(url => {
                let name = url.replace('https://telegra.ph/', '');
                html += `<a href="${url}" target="_blank" class="work-link">${name}</a>`;
            });
            html += '</div>';
            return html;
        }
        const linksHtml = buildLinks();
        document.getElementById('linksX').innerHTML = linksHtml;
        document.getElementById('linksA').innerHTML = linksHtml;

        // ========== КНОПКИ WORK ==========
        const workX = document.getElementById('workX');
        const workA = document.getElementById('workA');
        const linksX = document.getElementById('linksX');
        const linksA = document.getElementById('linksA');

        function toggleWork(btn, links) {
            linksX.classList.remove('show');
            linksA.classList.remove('show');
            links.classList.toggle('show');
        }

        workX.addEventListener('click', () => toggleWork(workX, linksX));
        workA.addEventListener('click', () => toggleWork(workA, linksA));

        // ========== ПЕРЕКЛЮЧЕНИЕ ТАБОВ ==========
        const tabX = document.getElementById('tabX');
        const tabA = document.getElementById('tabA');
        const paneX = document.getElementById('paneX');
        const paneA = document.getElementById('paneA');

        tabX.addEventListener('click', () => {
            tabX.classList.add('active');
            tabA.classList.remove('active');
            paneX.classList.add('active-pane');
            paneA.classList.remove('active-pane');
            linksX.classList.remove('show');
            linksA.classList.remove('show');
        });

        tabA.addEventListener('click', () => {
            tabA.classList.add('active');
            tabX.classList.remove('active');
            paneA.classList.add('active-pane');
            paneX.classList.remove('active-pane');
            linksX.classList.remove('show');
            linksA.classList.remove('show');
        });
    })();
</script>
</body>
</html>
